<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="./config.js"></script>
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./global.css" />
  </head>
  <body>
    <h1>Header 1</h1>
    <h2>Header 2</h2>
    <h3>Header 3</h3>
    <h4>Header 4</h4>
    <h5>Header 5</h5>
    <h6>Header 6</h6>
    <div>
      <button>Click me</button>
      <button data-state="hover">Hovered</button>
      <button data-state="focus">Focused</button>
      <button data-state="active">Active</button>
    </div>
    <div>
      <a href="#">Link text</a>
      <a href="#" data-state="hover">Hovered</a>
      <a href="#" data-state="focus">Focused</a>
      <a href="#" data-state="active">Active</a>
      <a href="#" data-state="visited">Visited</a>
    </div>
  </body>
</html>
